package:
  name: hurlman
  purpose: >
    A thin CLI wrapper around hurl that adds environment composition and
    computed-variable injection (with persistent caching). Lets a project
    run hurl files via "npx hurlman run -- ..." without sourcing shell
    scripts, and lets users declare token-minting / value-fetching logic
    inline alongside their static config. Includes an optional transparent
    HTTP proxy cache that replays prior API responses without modifying
    .hurl files.
  distribution: >-
    Published npm package. Exposes bin "hurlman". Written in TypeScript,
    compiled to JS for distribution. Hurlman itself ships as CommonJS;
    user env files may be ESM (.js with type:module, .mjs) or CJS (.js
    without type:module, .cjs) — node natively dispatches.
  invocation:
    - "All commands run via: npx hurlman <subcommand> [args]."
    - "init is the one-shot project setup; everything else (run, env,
      cache) is day-to-day use."
    - >-
      Hurlman flags (--env, --envs-dir) come first. A literal "--"
      separator MUST precede all arguments destined for hurl. Everything
      after "--" is passed to hurl verbatim. This is a hard boundary —
      no auto-detection, no overlap, no ambiguity. Example:
      "hurlman run --env staging -- foo.hurl --test --very-verbose".
  non_goals:
    - "Replacing hurl's syntax, assertion engine, or test discovery."
    - "Tag systems (use --glob and directory layout instead)."
    - "Folder-scoped variable scopes (variables are flat / global per run)."
    - >-
      Shipping any specific token producers — token logic is user code,
      declared inline in env files. The package provides the contract,
      not the implementations.
    - "Formatting, capturing, or interpreting hurl's output. Hurl owns
      stdout/stderr completely."

dependencies:
  runtime:
    - "commander — subcommand + flag parsing."
    - "better-sqlite3 — SQLite storage for token cache and HTTP response cache."
  peer:
    - "hurl >= 4.0 must be installed and on PATH (verified at runtime,
      not declared as an npm peerDependency since hurl is not on npm)."

env_module:
  intent: >-
    The user's project declares its environments as JavaScript modules.
    Each env module exports a single "variables" map whose entries are
    either literal strings (static config) or SetterRecord objects
    (computed values). One file per env. No separate setters file.
  file_format:
    location: "envs/<name>.{js,mjs,cjs}. Loader resolves extensions in
      that priority. envs/default.<ext> is required."
    syntax: >-
      ESM (export default) or CommonJS (module.exports). Choice depends on
      the user's package.json "type" field. Init writes ESM if the user
      has type:module (or no package.json), otherwise CJS. JSDoc
      `/** @type {import('hurlman').EnvModule} */` works in both.
    shape: |
      EnvModule = { variables?: Record<string, string | SetterRecord> }
      SetterRecord = {
        produce: (env: Record<string,string>) => string | Promise<string>,
        cacheable?: boolean,        // default false
        ttlMs?: number,             // default 3600000 (1 hour)
        validator?: (value: string) => boolean,
        secret?: boolean,           // default false (use --secret if true)
        fingerprint?: (env: Record<string,string>) => string,  // default () => ''
      }
  composition:
    - >-
      envs/default.<ext> ALWAYS loads first as the base layer. Required;
      missing → clear error.
    - >-
      "--env a --env b" loads a, then b, on top of default in that order.
      Each named env is required; missing → clear error.
    - >-
      Merge rule: shallow-merge "variables" by key, last write wins. The
      same key in multiple files is allowed and resolves cleanly — no
      warnings.
    - >-
      Static and computed variables share one namespace. A later env can
      replace a setter with a literal string (and vice versa) by simply
      writing to the same key.
  discrimination:
    - "After all envs are merged, each entry is classified:"
    - "  typeof v === 'string' → static literal."
    - "  v && typeof v === 'object' && typeof v.produce === 'function'
      → setter."
    - "  anything else → throw, naming the variable and its origin file."
  setter_env_argument: >-
    `produce(env)` and `fingerprint(env)` receive the merged static
    variables map ONLY. Other setters' computed values are NOT visible.
    No setter chaining — keeps cache invalidation simple.
  worked_example: |
    A common pattern: declare a setter once in default.js and let each
    named env supply its own inputs through static variables.

    // envs/default.js
    export default {
      variables: {
        base_url: 'https://default.example.com',
        client_id: 'default-app',
        api_token: {
          produce: (env) => signJwt(env.client_id, env.base_url),
          cacheable: true,
          fingerprint: (env) => `${env.client_id}@${env.base_url}`,
          secret: true,
        },
      },
    };

    // envs/staging.js — only the inputs differ
    export default {
      variables: {
        base_url: 'https://staging.example.com',
        client_id: 'staging-app',
      },
    };

    On `--env staging`, hurlman merges variables, then runs the setter
    from default with staging's base_url + client_id. The fingerprint
    encodes the inputs so each env gets its own cache entry.
  error_handling: >-
    If `produce()` throws during run or env, hurlman writes the error
    (including the setter key) to stderr and aborts with exit code 1.
    Failures must be visible — no silent retries or fallbacks.

subcommands:

  init:
    purpose: >
      Bootstrap a new project with envs/default.js. Pure scaffolding —
      does not modify .gitignore, package.json, or any other existing
      file.
    behavior:
      - "Checks that hurl is on PATH; exits with a clear error if absent."
      - "Detects the user's package.json `type` field. Writes the ESM
        template if `type: module` (or no package.json), otherwise CJS."
      - "Creates envs/ directory and envs/default.js with a stub
        EnvModule export and commented-out examples."
      - "Idempotent: skips files that already exist unless --force."
    flags:
      - "--envs-dir <path>       (default: envs)"
      - "--force"

  run:
    purpose: >
      Resolve env modules, inject --variable / --secret flags, exec hurl.
      Hurlman does NOT format, filter, or interpret hurl's output —
      stdio is inherited.
    behavior:
      - >-
        Argument boundary: hurlman parses only flags before the literal
        "--" separator. Everything after "--" is forwarded to hurl
        verbatim. If "--" is missing or no args follow, hurlman exits
        with a usage error.
      - >-
        Loads envs in order: default.js first, then each --env in
        left-to-right order. Errors clearly if any file is missing.
      - >-
        After merging, splits entries into static variables and setters,
        then runs setters via the cache (resolve flow, see cache_api).
        If a setter throws, hurlman writes the error to stderr and
        aborts with exit code 1.
      - >-
        Static variables become hurl --variable flags. Setter outputs
        with secret:true become --secret; otherwise --variable.
      - >-
        Spawns hurl with stdio: inherit. Hurl writes directly to the
        user's stdout/stderr. Hurlman captures nothing and parses no
        report. Output behavior is fully controlled by hurl's own flags
        (--verbose, --error-format, --report-html, etc.).
      - "Exits with hurl's exit status."
      - >-
        When the proxy cache is active (proxy.enabled=true in hurlman.json
        or --cache flag): hurlman starts the local proxy (or uses proxy.url
        if set), appends --proxy <address> and --insecure to hurl args,
        tears down after hurl exits.
    flags:
      - "--env <name>            (repeatable; left-to-right composition)"
      - "--envs-dir <path>"
      - "--refresh               (force re-produce of cacheable setters
        this run; updates the cache with fresh values)"
      - "--cache                 (enable HTTP proxy cache for this run,
        overriding proxy.enabled in hurlman.json)"
      - "--no-cache              (disable HTTP proxy cache for this run,
        overriding proxy.enabled in hurlman.json)"

  env:
    purpose: >
      Print the resolved hurl-variable map. Useful for sanity checks or
      piping into other tools.
    behavior:
      - "Loads envs the same way 'run' does."
      - "Runs all setters (with cache). On error, aborts with exit
        code 1 (same as run)."
      - "Prints key=value lines on stdout, sorted by key."
    flags:
      - "--env <name>            (repeatable)"
      - "--envs-dir <path>"
      - "--refresh               (force re-produce of cacheable setters
        this run; updates the cache with fresh values)"

  cache:
    purpose: Inspect / manage the persistent cache database.
    subcommands:
      list: >-
        Prints "<key>\t<cachedAt>" lines for each token/setter cache entry.
        Values omitted to avoid leaking secrets to stdout.
      clear: >-
        No flags: wipes all HTTP response entries AND all token cache entries.
        --responses: wipe only HTTP response entries (optionally filtered by
        URL substring pattern argument).
        --setters: wipe only token/setter cache entries.
        Pattern (substring match against URL) is only meaningful with
        --responses or when clearing all responses.
      "invalidate <key>": "Deletes one token cache entry by exact key."
    behavior:
      - >-
        Database path: .hurlman.db in project root. Configurable via
        the HURLMAN_CACHE_PATH env var.

cache_api:
  scope: >-
    Covers setter/token values only. HTTP request/response caching is
    specified under http_proxy_cache.
  file:
    path: ".hurlman.db in project root (or HURLMAN_CACHE_PATH override)."
    format: >-
      SQLite database managed by better-sqlite3. Single file; no background
      process. Token cache entries live in the token_cache table:
        token_cache (key TEXT PRIMARY KEY, value TEXT NOT NULL, cached_at TEXT NOT NULL)
  key_derivation:
    - "<varName>::<setter.fingerprint(env) || ''>"
    - >-
      No env name in the key. Fingerprint encodes the inputs that
      determine the value; same inputs from any env share the cache.
  freshness_rules:
    - "cachedAt + ttlMs > now, AND"
    - "validator(value) === true (if validator defined)."
    - "Either condition false → entry is bypassed and re-produced."
  resolve_flow:
    - "If setter.cacheable is false: produce(env) directly, return."
    - "Else: read cache, check freshness, return cached value if fresh."
    - "Else: produce(env), write entry, return."
    - >-
      --refresh forces re-produce regardless of freshness; the new values
      are written back to the cache. To wipe entries, use the cache
      subcommand (clear / invalidate).

http_proxy_cache:
  intent: >-
    Hurlman optionally spawns a local HTTP proxy before each hurl invocation
    and injects --proxy <address> (and --insecure) transparently. Hurl is
    unaware. Setup calls cached from a prior run return immediately without
    hitting the real API. The proxy tears down cleanly after hurl exits.
  storage:
    database: >-
      Same .hurlman.db file as the token cache (or HURLMAN_CACHE_PATH
      override).
    responses_schema: |
      responses (
        key              TEXT PRIMARY KEY,   -- derived cache key
        method           TEXT NOT NULL,
        url              TEXT NOT NULL,
        status_code      INTEGER NOT NULL,
        response_headers TEXT NOT NULL,      -- JSON
        response_body    BLOB NOT NULL,
        cached_at        TEXT NOT NULL       -- ISO timestamp
      )
  key_derivation:
    - "METHOD + \"::\" + URL + \"::\" + SHA256(request body; empty string if no body)"
    - >-
      Auth headers (Authorization, X-Auth-Token, X-API-Key, Cookie) are
      excluded from the hash so a token rotation does not invalidate cached
      responses.
  config:
    - "Controlled by hurlman.json (see hurlman_config section)."
    - "proxy.enabled = false by default; proxy does not start unless enabled."
    - >-
      proxy.url (optional): custom proxy address; if absent, hurlman picks
      localhost:<free-port>.
    - "--cache / --no-cache run flags override proxy.enabled for a single invocation."
  proxy_behavior:
    - >-
      When active: hurlman selects an available local port (unless proxy.url
      is set), starts the proxy, appends --proxy <address> and --insecure to
      the hurl invocation, then tears the proxy down after hurl exits.
    - >-
      When inactive: no proxy, no flag injection, hurl invocation is
      unchanged.
  freshness:
    - >-
      A cached response is fresh if (now - cached_at) <= proxy.ttlMs, or if
      proxy.ttlMs is null (no expiry). Stale entries are treated as misses:
      the real request goes through, the fresh response overwrites the entry.
  replay:
    - >-
      Automatic on cache hit (fresh entry). No replay-mode flag. On miss or
      stale entry, the real request goes through and the response is stored.
  invalidation:
    - "hurlman cache clear              -- wipe all response + token cache entries"
    - "hurlman cache clear --responses  -- wipe only HTTP response entries"
    - "hurlman cache clear --responses <pattern> -- wipe response entries where url contains <pattern>"
    - "hurlman cache clear --setters    -- wipe only token/setter cache entries"
    - "Body change = automatic miss (SHA256 won't match)."
    - "Token rotation = no invalidation needed (auth headers excluded from key)."

hurlman_config:
  file:
    path: "hurlman.json in the project root. User-owned; commit it if desired."
    format: |
      JSON object. Hurlman reads it at startup; missing file = all defaults apply.
      Shape:
        {
          "proxy": {
            "enabled": false,       // default; set true to activate HTTP proxy cache
            "url": "<optional>",    // override the auto-selected proxy address;
                                    // if absent, hurlman picks localhost:<free-port>
            "ttlMs": 28800000       // default 8 hours; null = no expiry
          }
        }
  known_keys:
    proxy.enabled: >-
      boolean. Controls whether the HTTP proxy cache starts on run/env.
    proxy.url: >-
      string (optional). Custom proxy address instead of auto-selected one.
      Useful for routing through an existing corporate proxy or test setup.
    proxy.ttlMs: >-
      number | null. How long a cached response is considered fresh, in
      milliseconds. Default: 28800000 (8 hours). null means entries never
      expire. Responses past TTL are treated as misses and re-fetched.
  behavior:
    - "hurlman.json is parsed once at process start; malformed JSON → clear error + exit 1."
    - "Unknown keys are ignored (forward-compat)."
    - >-
      --cache / --no-cache run flags override proxy.enabled for that
      invocation only; they do not modify hurlman.json.

logging:
  philosophy: >-
    Hurl owns logging. Hurlman never formats, captures, or interprets
    hurl's output. Use hurl's own flags (--verbose, --very-verbose,
    --error-format long, --report-html, --json, etc.) to control what
    you see. Anything more than that is out of scope for hurlman.
  implementation:
    - "Spawn hurl with stdio: 'inherit'."
    - "Args: --secret injections, then --variable injections, then user
      args from after '--', in that order."
    - "No --report-json, no capture, no parsing, no formatting."

file_layout:
  produced_by_init:
    - "envs/                  (user adds env files here)"
    - "envs/default.js        (stub EnvModule with commented examples)"
  user_owned:
    - "envs/*.{js,mjs,cjs}    (all env modules; one per environment)"
    - "any *.hurl files       (location is the project's choice)"
    - "hurlman.json           (persistent config — proxy settings; commit if desired)"
  runner_owned:
    - >-
      The runner internals (env loader, cache, dispatcher). Shipped via
      the npm package; user does not modify.
    - ".hurlman.db            (SQLite database — token cache + HTTP response cache; gitignore this)"

verification:
  must_pass:
    - >-
      "npx hurlman init" in an empty directory creates envs/default.js
      and idempotently no-ops on re-run.
    - >-
      "npx hurlman init" with hurl not on PATH exits with a clear error
      before creating any files.
    - >-
      "npx hurlman init" detects the user's package.json type:module
      flag and writes the matching template syntax.
    - >-
      "npx hurlman env" prints all merged variables (static + computed)
      sorted by key.
    - >-
      "npx hurlman run -- foo.hurl" invokes hurl with --variable
      injections. Hurl owns stdout/stderr; output looks identical to
      running hurl directly aside from injected flags.
    - >-
      "npx hurlman run -- foo.hurl --very-verbose --error-format long"
      passes those flags through to hurl unchanged.
    - >-
      "npx hurlman run foo.hurl" (missing "--") exits with a usage error
      explaining that "--" is required.
    - >-
      "--env" composition: a setter declared in default.js runs against
      the merged variables from the named env(s), so per-env inputs
      flow through automatically.
    - >-
      A setter whose produce() throws causes the command to write the
      error to stderr and abort with exit code 1.
    - >-
      Cache: re-running "npx hurlman env" does not re-execute cacheable
      setters (cache list timestamps unchanged). --refresh forces
      re-execution and updates the cache.
    - >-
      Cache: changing a setter's fingerprint inputs (e.g. switching env)
      produces a new entry without disturbing the old one.
    - >-
      Missing envs/default.{js,mjs,cjs} produces a clear error before
      any hurl call.
    - >-
      A variable whose value is neither a string nor a valid setter
      record produces a clear error naming the variable and its file.
